<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContextCore — Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background: #0a0a0f;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .container { max-width: 420px; padding: 2rem; }
      .icon { font-size: 3rem; margin-bottom: 1.25rem; }
      h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.75rem; color: #f8fafc; }
      p { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; }
      .badge {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.35rem 0.9rem;
        border-radius: 999px;
        background: #1e293b;
        border: 1px solid #334155;
        font-size: 0.75rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>You're offline</h1>
      <p>ContextCore server is unreachable. Cached content may still be available — try navigating back to the app.</p>
      <span class="badge">ContextCore Visualizer</span>
    </div>
  </body>
</html>
